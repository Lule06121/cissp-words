<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CISSP">
<title>CISSP Flashcards</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px; background-color: #f4f4f9; margin: 0; }
  .screen { width: 90vw; max-width: 400px; display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  .box { background: #fff; padding: 20px; border-radius: 12px; width: 100%; box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
  button { width: 100%; padding: 15px; font-size: 1.1em; font-weight: bold; color: #fff; background-color: #007bff; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;}
  .btn-fail { background-color: #dc3545; }
  .btn-success { background-color: #28a745; }
  .lang-switch { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
  .lang-switch label { font-size: 1.1em; font-weight: bold; }
  .section-title { font-weight: bold; margin-bottom: 10px; display: block; text-align: left; font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 15px;}
  .option-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; text-align: left; }
  .option-list label { font-size: 1em; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  input[type="checkbox"], input[type="radio"] { transform: scale(1.3); }
  .domain-list { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 15px; text-align: left; }
  .domain-list label { font-size: 0.95em; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  #search-input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; margin-bottom: 10px; }
  #search-results { max-height: 250px; overflow-y: auto; text-align: left; font-size: 0.95em; }
  .search-item { border-bottom: 1px solid #eee; padding: 10px 0; }
  .search-term { font-weight: bold; color: #0056b3; margin-bottom: 4px; }
  .header-controls { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 15px; }
  .status { font-size: 0.9em; color: #555; font-weight: bold; }
  .btn-quit { width: auto; padding: 8px 15px; font-size: 0.9em; margin-top: 0; background-color: #dc3545; }
  .card { width: 100%; height: 250px; perspective: 1000px; margin-bottom: 20px; }
  .card-inner { width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
  .card-front { background-color: #fff; color: #333; }
  .card-back { background-color: #0056b3; color: #fff; transform: rotateY(180deg); overflow-y: auto; }
  .domain-tag { font-size: 0.8em; color: #666; margin-bottom: 10px; font-weight: bold; }
  .term { font-size: 1.4em; font-weight: bold; }
  .definition { font-size: 1em; line-height: 1.4; }
  .controls { display: flex; gap: 10px; width: 100%; }
  .controls button { flex: 1; margin-top: 0; }
  .score-display { font-size: 1.5em; font-weight: bold; color: #0056b3; margin: 20px 0; }
</style>
</head>
<body>
  <div id="setup-screen" class="screen active">
    <div class="box">
      <div class="lang-switch">
        <label><input type="radio" name="lang" value="ja" onchange="changeLang()"> 日本語</label>
        <label><input type="radio" name="lang" value="en" onchange="changeLang()"> English</label>
      </div>
      <span class="section-title" id="ui-mode-title">出題モード</span>
      <div class="option-list">
        <label><input type="radio" name="mode" value="all" checked> <span id="ui-mode-all">すべて</span></label>
        <label><input type="radio" name="mode" value="spaced"> <span id="ui-mode-spaced">最適復習 (忘却曲線)</span></label>
      </div>
      <span class="section-title" id="ui-setup-title">出題ドメイン</span>
      <div class="domain-list">
        <label><input type="checkbox" class="domain-cb" value="domain1"> <span id="label-d1">D1</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain2"> <span id="label-d2">D2</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain3"> <span id="label-d3">D3</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain4"> <span id="label-d4">D4</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain5"> <span id="label-d5">D5</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain6"> <span id="label-d6">D6</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain7"> <span id="label-d7">D7</span></label>
        <label><input type="checkbox" class="domain-cb" value="domain8"> <span id="label-d8">D8</span></label>
      </div>
      <span class="section-title" id="ui-law-title">法規制</span>
      <div class="option-list">
        <label><input type="checkbox" id="include-law" value="law"> <span id="label-law">米国法律・規制</span></label>
      </div>
      <button id="ui-start-btn" onclick="startApp()">学習を開始する</button>
      <span class="section-title" id="ui-search-title">検索</span>
      <input type="text" id="search-input" oninput="handleSearch()">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="study-screen" class="screen">
    <div class="header-controls">
      <div class="status" id="status"></div>
      <button class="btn-quit" id="ui-quit-btn" onclick="endSession()">終了</button>
    </div>
    <div class="card" id="flashcard">
      <div class="card-inner">
        <div class="card-face card-front"><div class="domain-tag" id="domain-label"></div><div class="term" id="term"></div></div>
        <div class="card-face card-back"><div class="definition" id="definition"></div></div>
      </div>
    </div>
    <div class="controls" id="reveal-control"><button id="ui-reveal-btn" onclick="showAnswer()">解答表示</button></div>
    <div class="controls" id="action-controls" style="display: none;">
      <button class="btn-fail" id="ui-fail-btn" onclick="recordResult(false)">忘れた</button>
      <button class="btn-success" id="ui-success-btn" onclick="recordResult(true)">覚えた</button>
    </div>
  </div>
  <div id="result-screen" class="screen"><div class="box"><h2 id="ui-result-title"></h2><div class="score-display" id="score-display"></div><button id="ui-back-btn" onclick="backToTop()">戻る</button></div></div>

<script>
const uiDict = {
  ja: { 
    modeTitle: "出題モード", modeAll: "すべての問題", modeSpaced: "最適復習 (忘却曲線)", setupTitle: "出題ドメイン", 
    lawTitle: "法規制・コンプライアンス", labelLaw: "米国法律・規制 (Law & Regulations)", startBtn: "学習を開始する", 
    quitBtn: "終了する", revealBtn: "解答を表示", failBtn: "忘れた", successBtn: "覚えた", resultTitle: "学習完了", 
    backBtn: "トップへ戻る", searchTitle: "用語クイック検索", searchPlaceholder: "検索...", searchEmpty: "該当なし", 
    d1: "D1: リスク管理", d2: "D2: 資産保護", d3: "D3: アーキテクチャ", d4: "D4: ネットワーク", d5: "D5: IAM", 
    d6: "D6: 評価テスト", d7: "D7: 運用", d8: "D8: 開発", 
    alertNoDomain: "項目を選択してください。", alertLoadFail: "問題データを読み込めませんでした。", alertNoReview: "復習すべき項目はありません。" 
  },
  en: { 
    modeTitle: "Study Mode", modeAll: "All", modeSpaced: "Spaced Repetition", setupTitle: "Domains", 
    lawTitle: "Legal & Compliance", labelLaw: "US Laws & Regulations", startBtn: "Start", 
    quitBtn: "Quit", revealBtn: "Show Answer", failBtn: "Forgot", successBtn: "Remembered", resultTitle: "Complete", 
    backBtn: "Top", searchTitle: "Search", searchPlaceholder: "Search...", searchEmpty: "No results", 
    d1: "D1", d2: "D2", d3: "D3", d4: "D4", d5: "D5", d6: "D6", d7: "D7", d8: "D8", 
    alertNoDomain: "Please select an item.", alertLoadFail: "Failed to load data.", alertNoReview: "No items to review." 
  }
};

let allMasterData = []; let deck = []; let currentIndex = 0; let stats = JSON.parse(localStorage.getItem('cissp_stats')) || {}; let sessionCorrect = 0; let sessionAnswered = 0; let currentLang = localStorage.getItem('cissp_lang') || 'ja';

async function loadAllData() {
  allMasterData = []; let files = ["domain1", "domain2", "domain3", "domain4", "domain5", "domain6", "domain7", "domain8", "law"];
  for (let f of files) { try { const r = await fetch(`${f}.json`); if (r.ok) allMasterData = allMasterData.concat(await r.json()); } catch (e) {} }
}

function initLang() { document.querySelector(`input[name="lang"][value="${currentLang}"]`).checked = true; applyUIText(); loadAllData(); }

function changeLang() { currentLang = document.querySelector('input[name="lang"]:checked').value; localStorage.setItem('cissp_lang', currentLang); applyUIText(); handleSearch(); }

function applyUIText() {
  const d = uiDict[currentLang]; document.getElementById('ui-mode-title').innerText = d.modeTitle; document.getElementById('ui-mode-all').innerText = d.modeAll; document.getElementById('ui-mode-spaced').innerText = d.modeSpaced; document.getElementById('ui-setup-title').innerText = d.setupTitle; document.getElementById('ui-law-title').innerText = d.lawTitle; document.getElementById('label-law').innerText = d.labelLaw; document.getElementById('ui-start-btn').innerText = d.startBtn; document.getElementById('ui-quit-btn').innerText = d.quitBtn; document.getElementById('ui-reveal-btn').innerText = d.revealBtn; document.getElementById('ui-fail-btn').innerText = d.failBtn; document.getElementById('ui-success-btn').innerText = d.successBtn; document.getElementById('ui-result-title').innerText = d.resultTitle; document.getElementById('ui-back-btn').innerText = d.backBtn; document.getElementById('ui-search-title').innerText = d.searchTitle; document.getElementById('search-input').placeholder = d.searchPlaceholder;
  for (let i = 1; i <= 8; i++) document.getElementById(`label-d${i}`).innerText = d[`d${i}`];
}

function handleSearch() {
  const q = document.getElementById('search-input').value.toLowerCase(); const r = document.getElementById('search-results'); if (!q.trim()) { r.innerHTML = ''; return; }
  const h = allMasterData.filter(c => (c.term||"").toLowerCase().includes(q) || (c.definition||"").toLowerCase().includes(q) || (c.term_en||"").toLowerCase().includes(q) || (c.definition_en||"").toLowerCase().includes(q)).slice(0, 10);
  r.innerHTML = h.length ? h.map(c => `<div class="search-item"><div class="search-term">${currentLang=='en'&&c.term_en?c.term_en:c.term}</div><div>${currentLang=='en'&&c.definition_en?c.definition_en:c.definition}</div></div>`).join('') : uiDict[currentLang].searchEmpty;
}

async function startApp() {
  const cbs = document.querySelectorAll('.domain-cb:checked'); const law = document.getElementById('include-law').checked; 
  if (!cbs.length && !law) return alert(uiDict[currentLang].alertNoDomain);
  
  let raw = []; let files = Array.from(cbs).map(c => `${c.value}.json`); if (law) files.push('law.json');
  for (let f of files) { try { const r = await fetch(f); if (r.ok) raw = raw.concat(await r.json()); } catch (e) {} }
  
  if (raw.length === 0) return alert(uiDict[currentLang].alertLoadFail);

  const mode = document.querySelector('input[name="mode"]:checked').value;
  if (mode === 'spaced') { 
    const now = Date.now(); 
    deck = raw.filter(c => !stats[c.id] || !stats[c.id].nextReviewDate || stats[c.id].nextReviewDate <= now); 
    if (deck.length === 0) return alert(uiDict[currentLang].alertNoReview); 
  } else {
    deck = raw;
  }
  
  deck.sort(() => Math.random() - 0.5); currentIndex = 0; sessionCorrect = 0; sessionAnswered = 0; switchScreen('study-screen'); updateCard();
}

function updateCard() {
  const c = deck[currentIndex]; document.getElementById('domain-label').innerText = c.domain; document.getElementById('term').innerText = currentLang=='en'&&c.term_en?c.term_en:c.term; document.getElementById('definition').innerText = currentLang=='en'&&c.definition_en?c.definition_en:c.definition;
  document.getElementById('flashcard').classList.remove('flipped'); document.getElementById('reveal-control').style.display = 'flex'; document.getElementById('action-controls').style.display = 'none'; document.getElementById('status').innerText = `${currentIndex + 1} / ${deck.length}`;
}

function showAnswer() { document.getElementById('flashcard').classList.add('flipped'); document.getElementById('reveal-control').style.display = 'none'; document.getElementById('action-controls').style.display = 'flex'; }

function recordResult(win) {
  const id = deck[currentIndex].id; let s = stats[id] || { correct: 0, total: 0, interval: 0, easeFactor: 2.5, repetitions: 0 };
  s.total++; if (win) { s.correct++; s.interval = s.repetitions==0?1:s.repetitions==1?3:Math.round(s.interval*s.easeFactor); s.easeFactor+=0.1; s.repetitions++; sessionCorrect++; } else { s.interval=1; s.easeFactor=Math.max(1.3, s.easeFactor-0.2); s.repetitions=0; }
  s.nextReviewDate = Date.now() + (s.interval*86400000); stats[id] = s; localStorage.setItem('cissp_stats', JSON.stringify(stats)); sessionAnswered++;
  if (++currentIndex >= deck.length) endSession(); else updateCard();
}

function endSession() { document.getElementById('score-display').innerText = `${sessionCorrect} / ${sessionAnswered}`; switchScreen('result-screen'); }
function backToTop() { switchScreen('setup-screen'); document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; }
function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

initLang();
</script>
</body>
</html>
